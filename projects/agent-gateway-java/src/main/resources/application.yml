server:
  port: 8080

spring:
  application:
    name: agent-gateway-java

  # ===== Spring AI DashScope (Day 2 对照实现 — 非主路径) =====
  ai:
    openai:
      api-key: ${DASHSCOPE_API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: qwen3.7-plus
          temperature: 0.7

# ===== LangChain4j + DeepSeek (Day 6 主路径) =====
langchain4j:
  openai:
    api-key: ${DEEPSEEK_API_KEY}
    base-url: https://api.deepseek.com/v1
    model-name: deepseek-chat
    temperature: 0.7
    max-tokens: 2048
